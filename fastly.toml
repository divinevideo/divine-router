# ABOUTME: Fastly Compute configuration for divine-router
# ABOUTME: Routes wildcard subdomains to appropriate backends

authors = ["Divine Video"]
description = "Edge router for divine.video wildcard subdomains"
language = "rust"
manifest_version = 3
name = "divine-router"
service_id = "76fTayX6mBKa8faLeZ1fet"

[local_server]

  [local_server.backends]

    [local_server.backends.main_site]
      url = "https://inherently-ethical-gelding.edgecompute.app"

    [local_server.backends.username_handler]
      url = "https://inherently-ethical-gelding.edgecompute.app"

    [local_server.backends.blossom]
      url = "https://separately-robust-roughy.edgecompute.app"

    [local_server.backends.invite_service]
      url = "https://adversely-polished-yak.edgecompute.app"

    [local_server.backends.funnelcake_api]
      url = "https://relay.divine.video"

  [local_server.kv_stores]

    [local_server.kv_stores.usernames]
      file = "kv_usernames.json"
      format = "json"

[scripts]
  build = "cargo build --profile release --target wasm32-wasip1"

[setup]

  [setup.backends]

    [setup.backends.main_site]
      address = "inherently-ethical-gelding.edgecompute.app"
      port = 443

    [setup.backends.username_handler]
      address = "inherently-ethical-gelding.edgecompute.app"
      port = 443

    [setup.backends.blossom]
      address = "separately-robust-roughy.edgecompute.app"
      port = 443

    [setup.backends.invite_service]
      address = "adversely-polished-yak.edgecompute.app"
      port = 443

    [setup.backends.funnelcake_api]
      address = "relay.divine.video"
      port = 443

  [setup.kv_stores]

    [setup.kv_stores.usernames]
